<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 300" width="100%" height="100%">
  <!-- Background matching GitHub Dark Mode -->
  <rect width="830" height="300" rx="8" fill="#0D1117" stroke="#30363D" stroke-width="2"/>

  <!-- Title Bar -->
  <line x1="0" y1="35" x2="830" y2="35" stroke="#30363D" stroke-width="1.5"/>
  
  <!-- Window Control Buttons (Red, Yellow, Green) -->
  <circle cx="20" cy="17.5" r="6" fill="#FF5F56"/>
  <circle cx="38" cy="17.5" r="6" fill="#FFBD2E"/>
  <circle cx="56" cy="17.5" r="6" fill="#3FB950"/>

  <!-- Terminal Title -->
  <text x="415" y="22" fill="#8B949E" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold" text-anchor="middle">KARTIK OS - Developer Workspace (v1.0.0)</text>

  <!-- Left / Right Panel Separator (30% Left Column) -->
  <line x1="250" y1="35" x2="250" y2="300" stroke="#30363D" stroke-width="1.5"/>

  <!-- Left Column: ASCII Placeholder (30% width) -->
  <text x="125" y="168" fill="#8B949E" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold" text-anchor="middle">[ ASCII PROFILE ]</text>

  <!-- Right Column: Terminal Content -->
  <!-- Prompt line -->
  <text x="280" y="70" fill="#39FF14" font-family="Fira Code, Consolas, Monaco, monospace" font-size="13" font-weight="bold">kartik@github:~$ whoami</text>

  <!-- Info Data Rows -->
  <!-- Name -->
  <text x="280" y="105" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">Name      ::</text>
  <text x="385" y="105" fill="#F0F6FC" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12">Kartik Gupta</text>

  <!-- Role -->
  <text x="280" y="130" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">Role      ::</text>
  <text x="385" y="130" fill="#F0F6FC" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12">AI/ML Student</text>

  <!-- Focus -->
  <text x="280" y="155" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">Focus     ::</text>
  <text x="385" y="155" fill="#F0F6FC" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12">AI • Full Stack • Odoo</text>

  <!-- Learning -->
  <text x="280" y="180" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">Learning  ::</text>
  <text x="385" y="180" fill="#F0F6FC" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12">AI Agents • Next.js • FastAPI</text>

  <!-- Mission -->
  <text x="280" y="205" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">Mission   ::</text>
  <text x="385" y="205" fill="#F0F6FC" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12">Building impactful AI products</text>

  <!-- Terminal Next Prompt -->
  <text x="280" y="245" fill="#39FF14" font-family="Fira Code, Consolas, Monaco, monospace" font-size="13" font-weight="bold">kartik@github:~$ </text>
  
  <!-- Blinking Cursor character -->
  <text x="415" y="245" fill="#39FF14" font-family="Fira Code, Consolas, Monaco, monospace" font-size="13">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>█</text>
</svg>
