<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 300" width="100%" height="100%">
  <!-- Background matching GitHub Dark Mode -->
  <rect width="830" height="300" rx="8" fill="#0D1117" stroke="#30363D" stroke-width="2"/>

  <!-- Title Bar -->
  <line x1="0" y1="35" x2="830" y2="35" stroke="#30363D" stroke-width="1.5"/>
  
  <!-- Window Control Buttons (Red, Yellow, Green) -->
  <circle cx="20" cy="17.5" r="6" fill="#FF5F56"/>
  <circle cx="38" cy="17.5" r="6" fill="#FFBD2E"/>
  <circle cx="56" cy="17.5" r="6" fill="#3FB950"/>

  <!-- Terminal Title -->
  <text x="415" y="22" fill="#8B949E" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold" text-anchor="middle">KARTIK OS - Developer Workspace (v1.0.0)</text>

  <!-- Terminal Content: WHOAMI Section -->
  <!-- Prompt line -->
  <text x="30" y="65" fill="#39FF14" font-family="Fira Code, Consolas, Monaco, monospace" font-size="13" font-weight="bold">kartik@github:~$ whoami</text>

  <!-- COLUMN 1: Identity -->
  <text x="30" y="90" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">identity:</text>
  
  <text x="45" y="110" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">name:</text>
  <text x="120" y="110" fill="#F0F6FC" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12">Kartik Gupta</text>

  <text x="45" y="130" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">role:</text>
  <text x="120" y="130" fill="#F0F6FC" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12">AI/ML Student</text>

  <text x="45" y="150" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">country:</text>
  <text x="120" y="150" fill="#F0F6FC" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12">India</text>

  <!-- COLUMN 2: Current Focus -->
  <text x="300" y="90" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">current_focus:</text>
  
  <text x="315" y="110" fill="#3FB950" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">- <tspan fill="#F0F6FC" font-weight="normal">AI-powered Applications</tspan></text>
  <text x="315" y="130" fill="#3FB950" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">- <tspan fill="#F0F6FC" font-weight="normal">Full Stack Development</tspan></text>
  <text x="315" y="150" fill="#3FB950" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">- <tspan fill="#F0F6FC" font-weight="normal">Odoo Development</tspan></text>
  <text x="315" y="170" fill="#3FB950" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">- <tspan fill="#F0F6FC" font-weight="normal">Hackathon Projects</tspan></text>
  <text x="315" y="190" fill="#3FB950" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">- <tspan fill="#F0F6FC" font-weight="normal">UI/UX Engineering</tspan></text>

  <!-- COLUMN 3: Learning -->
  <text x="560" y="90" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">learning:</text>
  
  <text x="575" y="110" fill="#3FB950" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">- <tspan fill="#F0F6FC" font-weight="normal">AI Agents</tspan></text>
  <text x="575" y="130" fill="#3FB950" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">- <tspan fill="#F0F6FC" font-weight="normal">FastAPI</tspan></text>
  <text x="575" y="150" fill="#3FB950" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">- <tspan fill="#F0F6FC" font-weight="normal">Next.js</tspan></text>
  <text x="575" y="170" fill="#3FB950" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">- <tspan fill="#F0F6FC" font-weight="normal">Odoo Framework</tspan></text>
  <text x="575" y="190" fill="#3FB950" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">- <tspan fill="#F0F6FC" font-weight="normal">System Design</tspan></text>

  <!-- Mission Section (below columns) -->
  <text x="30" y="220" fill="#58A6FF" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12" font-weight="bold">mission:</text>
  <text x="45" y="240" fill="#F0F6FC" font-family="Fira Code, Consolas, Monaco, monospace" font-size="12">Build impactful AI products with exceptional user experiences.</text>

  <!-- Terminal Next Prompt -->
  <text x="30" y="275" fill="#39FF14" font-family="Fira Code, Consolas, Monaco, monospace" font-size="13" font-weight="bold">kartik@github:~$ </text>
  
  <!-- Blinking Cursor character -->
  <text x="165" y="275" fill="#39FF14" font-family="Fira Code, Consolas, Monaco, monospace" font-size="13">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>█</text>
</svg>
