# ==============================================================================
# WORKFLOW: Generate Contribution Grid Snake
# Description: Automatically generates a 2D snake game eating the contribution
#              graph grid daily at midnight, saving SVGs to the 'output' branch.
# ==============================================================================
#
# REQUIRED PERMISSIONS:
# This workflow requires WRITE permissions to the repository's contents to push
# the compiled snake SVGs.
#
# IMPORTANT CONFIGURATION:
# Go to your repository settings on GitHub:
# Settings -> Actions -> General -> Workflow permissions
# Ensure "Read and write permissions" is selected and click Save.
#
# ==============================================================================

name: Generate Snake Animation

on:
  # Automatically run daily at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Run on push to main branch to initialize immediately
  push:
    branches:
      - main

permissions:
  # Grants the permission required to commit and push files to the target branch
  contents: write

jobs:
  generate:
    name: Build & Deploy Snake Graphic
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Generate the snake game SVGs based on Kartik's contribution history
      - name: Generate Github Contribution Grid Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: KartikGupta06
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Step 2: Deploy generated SVG files to the independent 'output' branch
      - name: Push Snake SVGs to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
